services:
  postgres:
    image: postgres:16-alpine
    container_name: amazon-clone-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: amazon_clone
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
